kind: Service                     # Defines to create Service type Object
apiVersion: v1

metadata:
  name: demoservice

spec:
  ports:
    - port: 80                    # Service port
      targetPort: 80              # Container port

  selector:
    app: deployment               # should match with deployment file label

  type: LoadBalancer              # Specifies the service type i.e. ClusterIP (default) or NodePort or LoadBalancer
